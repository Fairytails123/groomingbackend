<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Fairy Tails Knowledge</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <main>
    <div class="card" style="max-width:400px; margin: var(--space-7) auto;">
      <h1 style="margin-bottom:var(--space-1);">Fairy Tails Knowledge</h1>
      <p class="muted" style="margin-bottom:var(--space-5);">Admin sign-in</p>

      <form id="login-form" class="stack" autocomplete="off">
        <div>
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            autocomplete="current-password"
            required
            autofocus>
        </div>
        <button class="btn" type="submit" id="login-button">Sign in</button>
      </form>

      <p class="muted" id="login-error" role="alert" style="margin-top:var(--space-3); color:var(--color-error); display:none;"></p>
    </div>
  </main>
  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="js/pages/login.js"></script>
</body>
</html>
