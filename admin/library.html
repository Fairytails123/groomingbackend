<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Breed library — Fairy Tails Knowledge</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <header class="topbar">
    <a href="dashboard.html" class="topbar__brand">Fairy Tails Knowledge</a>
    <nav class="topbar__nav" aria-label="Primary">
      <a href="dashboard.html" class="topbar__link">Dashboard</a>
      <a href="library.html"   class="topbar__link" aria-current="page">Library</a>
      <a href="upload.html"    class="topbar__link">Upload</a>
      <a href="#"              class="topbar__link" id="logout-link">Sign out</a>
    </nav>
  </header>

  <main class="stack">
    <div class="row row--space-between">
      <h1>Breed library</h1>
      <button class="btn btn--secondary" id="new-breed-button">+ New breed</button>
    </div>

    <div class="card">
      <div class="row" style="flex-wrap:wrap; gap:var(--space-3);">
        <div style="flex:1; min-width:200px;">
          <label class="sr-only" for="search">Search</label>
          <input id="search" type="search" placeholder="Search breeds…" autocomplete="off">
        </div>
        <div style="min-width:140px;">
          <label class="sr-only" for="filter-status">Status</label>
          <select id="filter-status">
            <option value="">All statuses</option>
            <option>Draft</option>
            <option>Processing</option>
            <option>Needs Review</option>
            <option>Published</option>
            <option>Archived</option>
            <option>Failed</option>
          </select>
        </div>
        <div style="min-width:140px;">
          <label class="sr-only" for="filter-type">Type</label>
          <select id="filter-type">
            <option value="">All types</option>
            <option value="pure">Pure</option>
            <option value="cross">Cross</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <table class="table">
        <thead>
          <tr>
            <th>Breed</th>
            <th class="col-hide-sm">Type</th>
            <th>Profiles</th>
            <th class="col-hide-sm">Last updated</th>
          </tr>
        </thead>
        <tbody id="breed-table-body">
          <tr><td colspan="4" class="muted center">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- New breed modal (rendered by library.js when needed) -->
  <div id="modal-root"></div>
  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="js/pages/library.js"></script>
</body>
</html>
